<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media + Canvas + SVG</title>
</head>
<body>

    <h1>Audio & Video Example</h1>
 
    <h3>Audio</h3>
    <audio controls autoplay muted loop>
        <source src="kamli.mp3" type="audio/mpeg">
        Your browser does not support audio.
    </audio>
 
    <h3>Video</h3>
    <video width="400" controls autoplay muted loop>
        <source src="Kamli.mp4" type="video/mp4">
        Your browser does not support video.
    </video>

    <hr>
 
    <h2>Canvas Shape</h2>
    <canvas id="myCanvas" width="300" height="200" style="border:1px solid black;"></canvas>

    <script>
        var canvas = document.getElementById("myCanvas");
        var ctx = canvas.getContext("2d");

        ctx.fillStyle = "blue";
        ctx.fillRect(50, 50, 100, 80);
        ctx.beginPath();
        ctx.arc(200, 100, 40, 0, 2 * Math.PI);
        ctx.fillStyle = "red";
        ctx.fill();
    </script>

    <hr>
 
    <h2>SVG Shapes</h2>

    <svg width="300" height="200">
         <rect x="20" y="20" width="100" height="60" fill="green"></rect>
 
        <circle cx="200" cy="80" r="40" fill="orange"></circle>
    </svg>

</body>
</html>
